[build]
  command = "pnpm build"
  publish = "out"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Unlisted proposal pages: keep them out of search engines entirely.
[[headers]]
  for = "/proposal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
